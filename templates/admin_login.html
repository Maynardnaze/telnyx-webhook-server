<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Telnyx Webhook Admin Login</title>
  <link rel="stylesheet" href="/admin/static/admin.css">
</head>
<body class="login-page">
  <main class="login-card">
    <h1>Telnyx Webhook Admin</h1>
    <p>Sign in with the webhook shared secret.</p>
    {% if error %}<div class="alert error">{{ error }}</div>{% endif %}
    <form method="post" action="/admin/login">
      <label for="secret">Shared secret</label>
      <input id="secret" name="secret" type="password" autocomplete="current-password" autofocus required>
      <button type="submit">Sign in</button>
    </form>
  </main>
</body>
</html>
