<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · Miswitch Insights Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/static/admin.css">
</head>
<body class="login-page">
  <main class="login-card">
    <div class="sidebar-brand" style="border:0; padding:0; margin-bottom:12px;">
      <div class="brand-mark">M</div>
      <div class="brand-copy">
        <div class="brand-title">Miswitch</div>
        <div class="brand-subtitle">insights console</div>
      </div>
    </div>
    <p>Sign in with the webhook shared secret to browse Telnyx insight deliveries.</p>
    {% if error %}<div class="alert error">{{ error }}</div>{% endif %}
    <form method="post" action="/admin/login" class="stacked">
      <div>
        <label for="secret">Shared secret</label>
        <input id="secret" name="secret" type="password" autocomplete="current-password" autofocus required>
      </div>
      <button type="submit">Open console</button>
    </form>
  </main>
</body>
</html>
